variables:
  DEFAULT_IMAGE: "python:3.14-bookworm"

stages:
  - codecheck
  - test
  - integration
  - coverage
  - build_docs
  - deploy_docs

include:
  - project: espressif/shared-ci-dangerjs
    ref: master
    file: danger.yaml
run-danger-mr-linter:
  stage: codecheck
  variables:
    ENABLE_CHECK_UPDATED_CHANGELOG: "false"

# WORKFLOW RULES
# ------------------------------------------------------------------------------------------------------
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"'
      when: never
    - if: "$CI_COMMIT_BRANCH"
# ------------------------------------------------------------------------------------------------------

# COMMON TEMPLATES
# ------------------------------------------------------------------------------------------------------
.common_template:
  image: python:${PYTHON_VERSION}-bookworm
  tags:
    - build
    - internet
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.8", "3.14"]
  variables:
    RUN_TESTS: "coverage run -m pytest -vv"
    COVERAGE_PROCESS_START: "${CI_PROJECT_DIR}/pyproject.toml"
    COVERAGE_RCFILE: "${CI_PROJECT_DIR}/pyproject.toml"
    COVERAGE_FILE: "$CI_PROJECT_DIR/.coverage.${CI_JOB_NAME}-${CI_NODE_INDEX:-0}"
    PYTHONUNBUFFERED: "1"
  artifacts:
    when: always # get artifacts no matter what test results are
    paths:
      - test/*/.coverage.*
      - .coverage.*

.base_template:
  extends: .common_template
  before_script:
    - pip install -e .[dev] --prefer-binary

.venv_template:
  extends: .common_template
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - python -m pip install -e .[dev] --prefer-binary
# --------------------------------------------------------------------------------------------------

# JOBS
# ------------------------------------------------------------------------------------------------------
# CODE CHECK BY PRE-COMMIT HOOKS
pre-commit_hooks_MR:
  extends: .base_template
  stage: codecheck
  script:
    - apt-get update && apt-get install -y -q git
    - echo "Merge request is from ${CI_COMMIT_REF_NAME} into ${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
    - git fetch origin ${CI_MERGE_REQUEST_TARGET_BRANCH_NAME} ${CI_COMMIT_REF_NAME}
    - export from_sha=$(git merge-base HEAD origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME})
    - echo "Checking changes from ${from_sha} to ${CI_COMMIT_SHA}:"
    - git log --oneline ${from_sha}..${CI_COMMIT_SHA}
    - echo "Modified files:"
    - git diff-tree --no-commit-id --name-only -r ${from_sha} ${CI_COMMIT_SHA}
    - echo "Running pre-commit:"
    - pre-commit run --from ${from_sha} --to ${CI_COMMIT_SHA}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $PYTHON_VERSION == "3.8"' #  run only on oldest python version supported

# ------------------------------------------------------------------------------------------------------

# TESTS
# ------------------------------------------------------------------------------------------------------
test_kconfserver:
  extends: .base_template
  stage: test
  script:
    - cd test/kconfserver/
    - $RUN_TESTS

test_kconfiglib:
  extends: .base_template
  stage: test
  script:
    - cd test/kconfiglib/
    - $RUN_TESTS

test_menuconfig:
  extends: .base_template
  stage: test
  script:
    - cd test/menuconfig/
    - $RUN_TESTS

test_gen_kconfig_doc:
  extends: .base_template
  stage: test
  script:
    - cd test/gen_kconfig_doc/
    - $RUN_TESTS

test_kconfgen:
  extends: .base_template
  stage: test
  script:
    - cd test/kconfgen/
    - $RUN_TESTS

test_kconfcheck:
  extends: .base_template
  stage: test
  script:
    - cd test/kconfcheck/
    - $RUN_TESTS

# TESTS in VENV
test_kconfserver_venv:
  extends: .venv_template
  stage: test
  script:
    - cd test/kconfserver/
    - $RUN_TESTS

test_kconfiglib_venv:
  extends: .venv_template
  stage: test
  script:
    - cd test/kconfiglib/
    - $RUN_TESTS

test_menuconfig_venv:
  extends: .venv_template
  stage: test
  script:
    - cd test/menuconfig/
    - $RUN_TESTS

test_gen_kconfig_doc_venv:
  extends: .venv_template
  stage: test
  script:
    - cd test/gen_kconfig_doc/
    - $RUN_TESTS

test_kconfgen_venv:
  extends: .venv_template
  stage: test
  script:
    - cd test/kconfgen/
    - $RUN_TESTS

test_kconfcheck_venv:
  extends: .venv_template
  stage: test
  script:
    - cd test/kconfcheck/
    - $RUN_TESTS
# -----------------------------------------------------------------------------------------------------

# INTEGRATION TESTS
# -----------------------------------------------------------------------------------------------------
# Integration jobs install ESP-IDF first, source `export.{sh,ps1}`, and then
# `pip install -e .[dev]` into IDF's active Python venv. Pytest therefore
# runs from inside IDF's venv, which gives `sys.executable` the right value
# for invoking `idf.py` and removes the need for PATH-resolution helpers.
#
# Integration jobs do not collect coverage: `idf.py` spawns many Python
# subprocesses and the `coverage[toml]` .pth startup hook is fragile across
# cwds and platforms. Coverage is tracked by the unit-test suites instead.
.integration_template:
  extends: .common_template
  stage: integration
  variables:
    IDF_TOOLS_PATH: "$CI_PROJECT_DIR/.cache/espressif"
    IDF_PATH: "$CI_PROJECT_DIR/idf"
    RUN_TESTS: "pytest -vv"
    COVERAGE_PROCESS_START: ""
    COVERAGE_RCFILE: ""
    COVERAGE_FILE: ""
  cache:
    - key: "esp-idf-tools-${IDF_BRANCH}-${PYTHON_VERSION}"
      paths: [.cache/espressif/]
  allow_failure: true
  before_script:
    - apt-get update && apt-get install -y -q git cmake ninja-build ccache libusb-1.0-0
    - git clone --depth=1 --recurse-submodules --shallow-submodules -b "$IDF_BRANCH" https://github.com/espressif/esp-idf.git "$IDF_PATH"
    - cd "$IDF_PATH" && ./install.sh && . ./export.sh
    - cd "$CI_PROJECT_DIR"
    - python -V
    - python -m pip install -e .[dev] --prefer-binary
  artifacts:
    paths: [] # no coverage artifacts in integration tests

integration_fast:
  extends: .integration_template
  variables:
    PYTHON_VERSION: "3.14"
    IDF_BRANCH: "master"
  parallel: 3
  script:
    # Shard across parallel jobs via INTEGRATION_SHARD_* (see test/integration/conftest.py).
    - export INTEGRATION_SHARD_TOTAL=$CI_NODE_TOTAL
    - export INTEGRATION_SHARD_INDEX=$((CI_NODE_INDEX - 1))
    - $RUN_TESTS test/integration -m "fast or cmakev2_fast"

# Compatibility runs against IDF release branches. Manual to avoid load on
# the runner pool; trigger when a change might affect older IDF revisions.
integration_fast_compat:
  extends: .integration_template
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.14"]
        IDF_BRANCH: ["release/v6.0", "release/v6.1"]
        SHARD: ["0", "1", "2"]
  rules:
    - when: manual
      allow_failure: true
  script:
    # Shard across parallel jobs via INTEGRATION_SHARD_* (see test/integration/conftest.py).
    - export INTEGRATION_SHARD_TOTAL=3
    - export INTEGRATION_SHARD_INDEX=$SHARD
    - $RUN_TESTS test/integration -m "fast or cmakev2_fast"

# Windows fast integration tests (windows-vm shell executor, PowerShell).
.integration_template_windows:
  stage: integration
  tags:
    - windows-vm
    - brew
  variables:
    # IDF_PATH / IDF_TOOLS_PATH are intentionally NOT set here; the
    # windows-vm runner provides CI_PROJECT_DIR as a *relative* path
    # (e.g. 'builds/espressif/esp-idf-kconfig'), which would otherwise
    # cause nested path duplication when used with git clone / cd.
    # They are derived from an absolutised CI_PROJECT_DIR in before_script.
    PYTHONUNBUFFERED: "1"
    GIT_SUBMODULE_STRATEGY: none
  cache:
    - key: "esp-idf-tools-windows-${IDF_BRANCH}-${PYTHON_VERSION}"
      paths: [.cache/espressif/]
  allow_failure: true
  before_script:
    - git config --global core.longpaths true
    - git config --global core.autocrlf false
    # Normalise paths. The windows-vm runner exposes CI_PROJECT_DIR as a
    # relative path; resolve it (and the derived IDF paths) to absolute so
    # `git clone` / `cd` work regardless of the current working directory.
    - $env:CI_PROJECT_DIR = (Get-Location).Path
    - $env:IDF_PATH       = Join-Path $env:CI_PROJECT_DIR 'idf'
    - $env:IDF_TOOLS_PATH = Join-Path $env:CI_PROJECT_DIR '.cache\espressif'
    - Write-Host "CI_PROJECT_DIR=$env:CI_PROJECT_DIR  IDF_PATH=$env:IDF_PATH  IDF_TOOLS_PATH=$env:IDF_TOOLS_PATH"
    # Make the requested Python the first one on PATH. IDF's install.ps1
    # creates its venv with whichever `python` it finds first; without this
    # step it picks the runner's system Python (3.10) and the matrix
    # PYTHON_VERSION value is ignored. uv is preinstalled on windows-vm.
    - uv python install $env:PYTHON_VERSION
    - $env:PATH = (Split-Path (uv python find $env:PYTHON_VERSION) -Parent) + ';' + $env:PATH
    - python -V
    # Install IDF (it creates its own Python venv on top of the 3.14 we
    # just put on PATH), then `pip install` esp-idf-kconfig into that
    # active venv so `sys.executable` is IDF's python when pytest runs.
    - git clone --depth=1 --recurse-submodules --shallow-submodules -b $env:IDF_BRANCH https://github.com/espressif/esp-idf.git $env:IDF_PATH
    - cd $env:IDF_PATH
    - .\install.ps1
    - .\export.ps1
    - cd $env:CI_PROJECT_DIR
    - python -V
    - python -m pip install -e .[dev] --prefer-binary

integration_fast_windows:
  extends: .integration_template_windows
  variables:
    PYTHON_VERSION: "3.14"
    IDF_BRANCH: "master"
  parallel: 3
  script:
    # Only the classic `fast` tier here; cmakev2 (cmakev2_fast) is intentionally
    # not run on Windows for now to keep the slow windows-vm jobs short.
    # Shard across parallel jobs via INTEGRATION_SHARD_* (see test/integration/conftest.py).
    - $env:INTEGRATION_SHARD_TOTAL = $env:CI_NODE_TOTAL
    - $env:INTEGRATION_SHARD_INDEX = [string]([int]$env:CI_NODE_INDEX - 1)
    - pytest -vv test/integration -m fast

# Compatibility runs against IDF release branches. Manual to avoid load on
# the small windows-vm runner pool; trigger as needed.
integration_fast_windows_compat:
  extends: .integration_template_windows
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.14"]
        IDF_BRANCH: ["release/v6.0", "release/v6.1"]
        SHARD: ["0", "1", "2"]
  rules:
    - when: manual
      allow_failure: true
  script:
    # cmakev2 (cmakev2_fast) is intentionally not run on Windows for now to keep
    # the slow windows-vm jobs short.
    # Shard across parallel jobs via INTEGRATION_SHARD_* (see test/integration/conftest.py).
    - $env:INTEGRATION_SHARD_TOTAL = "3"
    - $env:INTEGRATION_SHARD_INDEX = $env:SHARD
    - pytest -vv test/integration -m fast
# -----------------------------------------------------------------------------------------------------

# CODE COVERAGE
# -----------------------------------------------------------------------------------------------------
merge_coverage:
  stage: coverage
  image: $DEFAULT_IMAGE
  tags:
    - build
    - internet
  variables:
    COVERAGE_RCFILE: "$CI_PROJECT_DIR/pyproject.toml"
  artifacts:
    when: always
    paths:
      - coverage-merged.xml
      - html_report
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage-merged.xml
  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  script:
    - pip install -e .[dev] --prefer-binary

    # Combine ALL raw data files exactly once (from repo root)
    - coverage combine

    # Generate reports from the merged data
    - coverage xml -o coverage-merged.xml -i
    - coverage report --precision=2
    - coverage html -d html_report --precision=2


# ------------------------------------------------------------------------------------------------------

# BUILD AND DEPLOY DOCS
# ------------------------------------------------------------------------------------------------------
build_docs:
  stage: build_docs
  image: $DEFAULT_IMAGE
  tags:
    - build_docs
  rules:
    - changes:
        - "docs/**/*"
  needs: []
  artifacts:
    when: always
    paths:
      - docs/_build/*/*/*.txt
      - docs/_build/*/*/html/*
    expire_in: 4 days
  script:
    - pip install -e .[docs] --prefer-binary
    - cd docs
    - build-docs -l en

.deploy_docs_template:
  stage: deploy_docs
  image: $DEFAULT_IMAGE
  tags:
    - deploy
  needs:
    - build_docs
  before_script:
    - source ${CI_PROJECT_DIR}/docs/utils.sh
    - add_doc_server_ssh_keys $DOCS_DEPLOY_PRIVATEKEY $DOCS_DEPLOY_SERVER $DOCS_DEPLOY_SERVER_USER
    - export GIT_VER=$(git describe --always)
    - pip install -e .[docs] --prefer-binary
  script:
    - deploy-docs

deploy_docs_preview:
  extends:
    - .deploy_docs_template
  rules:
    - if: $CI_COMMIT_REF_NAME == "master"
      when: never
    - changes:
        - "docs/**/*"
  variables:
    TYPE: "preview"
    DOCS_BUILD_DIR: "${CI_PROJECT_DIR}/docs/_build/"
    DOCS_DEPLOY_PRIVATEKEY: "$DOCS_PREVIEW_PRIVATEKEY"
    DOCS_DEPLOY_SERVER: "$DOCS_PREVIEW_SERVER"
    DOCS_DEPLOY_SERVER_USER: "$DOCS_PREVIEW_USER"
    DOCS_DEPLOY_PATH: "$DOCS_PREVIEW_PATH"
    DOCS_DEPLOY_URL_BASE: "$DOCS_PREVIEW_URL_BASE"

deploy_docs_production:
  extends:
    - .deploy_docs_template
  rules:
    - if: $CI_COMMIT_REF_NAME == "master"
      changes:
      - "docs/**/*"
  variables:
    TYPE: "production"
    DOCS_BUILD_DIR: "${CI_PROJECT_DIR}/docs/_build/"
    DOCS_DEPLOY_PRIVATEKEY: "$DOCS_PROD_PRIVATEKEY"
    DOCS_DEPLOY_SERVER: "$DOCS_PROD_SERVER"
    DOCS_DEPLOY_SERVER_USER: "$DOCS_PROD_USER"
    DOCS_DEPLOY_PATH: "$DOCS_PROD_PATH"
    DOCS_DEPLOY_URL_BASE: "$DOCS_PROD_URL_BASE"
