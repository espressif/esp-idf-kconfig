[pytest]
addopts = -p no:embedded -p no:idf_ci -p no:ignore-test-results
log_cli = True
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
markers =
    fast: classic CMake fast integration tests (per-MR)
    full: classic CMake full integration tests (manual)
    cmakev2_fast: cmakev2 fast integration tests (per-MR)
    cmakev2_full: cmakev2 full integration tests (manual)
    fast_pre_release: 5-project distilled subset
